<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nat's Training Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f11;
    --surface: #141719;
    --surface2: #1a1d21;
    --surface3: #21252b;
    --border: #2a2f36;
    --border2: #343a42;
    --text: #e8eaed;
    --text2: #9aa0aa;
    --text3: #636b76;
    --orange: #f5820a;
    --orange-dim: rgba(245,130,10,0.15);
    --orange-border: rgba(245,130,10,0.35);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --purple: #a855f7;
    --purple-dim: rgba(168,85,247,0.12);
    --amber: #f59e0b;
    --teal: #14b8a6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
  }

  #app {
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    padding: 8px 10px 16px;
    gap: 6px;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 6px 0 2px;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
    text-align: center;
  }
  .logo span { color: var(--orange); }

  .nav-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    position: relative;
    padding-right: 60px;
    padding-left: 60px;
  }

  .today-btn {
    background: var(--orange-dim);
    border: 1px solid var(--orange-border);
    color: var(--orange);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s;
    position: absolute;
    right: 0;
  }
  .today-btn:hover { background: rgba(245,130,10,0.25); }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--surface3); border-color: var(--border2); }
  .nav-btn:active { transform: scale(0.95); }

  .date-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text);
    flex: 1;
  }
  .date-display .day-name { color: var(--orange); font-size: 11px; letter-spacing: 0.1em; }



  /* ── BOTTOM PROGRESS BAR ── */
  #progress-bottom {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 4px 0 2px;
  }
  .progress-label-bottom {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 0.04em;
    text-align: center;
  }
  .progress-bar-full {
    width: 100%;
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--amber));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── MAIN ── */
  #main {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ── TOP STRIP (phase + week aim) ── */
  #top-strip {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
  }

  .phase-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .week-type-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .sep { color: var(--border2); font-size: 10px; }

  .week-aim {
    font-size: 11px;
    color: var(--text2);
    flex: 1;
    line-height: 1.3;
  }
  .week-aim strong { color: var(--text); }

  .week-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
  }

  /* ── SESSION PANEL ── */
  #session-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 7px 10px 5px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .session-type-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    flex: 1;
  }

  .day-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stat-block {
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .stat-block:first-child { border-right: 1px solid var(--border); }

  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .stat-value.km { color: var(--orange); }
  .stat-value.time { color: var(--teal); }

  /* Session body */
  .session-body {
    padding: 7px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .session-text {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
  }

  .session-text .label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    display: block;
    margin-bottom: 2px;
    margin-top: 5px;
  }

  .session-text .label:first-child { margin-top: 0; }

  .session-text p { margin-bottom: 2px; }

  .effort-chip {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 3px;
    margin-bottom: 3px;
  }

  .coach-cue {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--orange);
    border-radius: 0 4px 4px 0;
    padding: 5px 8px;
    font-size: 11px;
    color: var(--text2);
    line-height: 1.4;
  }

  .coach-cue.fuel { border-left-color: var(--green); }
  .coach-cue.hr { border-left-color: var(--blue); }
  .coach-cue.effort { border-left-color: var(--orange); }
  .coach-cue.key { border-left-color: var(--amber); }

  .strength-section {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 8px;
  }
  .strength-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 3px;
  }

  .rest-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 20px;
  }
  .rest-icon { font-size: 32px; }
  .rest-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
  }
  .rest-sub { font-size: 11px; color: var(--text3); text-align: center; }

  /* ── WEATHER PANEL ── */
  #weather-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
  }

  .weather-header {
    padding: 7px 10px 5px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .weather-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    flex: 1;
  }

  .weather-loc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
  }

  /* Current conditions */
  .current-conditions {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .current-temp {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }
  .current-temp span { font-size: 18px; color: var(--text2); }

  .current-desc {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .current-condition {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  .current-meta {
    font-size: 10px;
    color: var(--text2);
    display: flex;
    gap: 8px;
  }
  .current-meta span { display: flex; align-items: center; gap: 2px; }

  .run-suitability {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .suit-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .suit-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Hourly strip */
  .hourly-label {
    padding: 4px 10px 2px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    flex-shrink: 0;
  }

  .hourly-scroll {
    display: flex;
    gap: 4px;
    padding: 2px 10px 6px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .hourly-scroll::-webkit-scrollbar { height: 2px; }
  .hourly-scroll::-webkit-scrollbar-track { background: transparent; }
  .hourly-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 1px; }

  .hour-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 4px 6px;
    border-radius: 5px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    min-width: 40px;
    background: var(--surface2);
  }
  .hour-chip:hover { border-color: var(--border2); }
  .hour-chip.active {
    border-color: var(--orange-border);
    background: var(--orange-dim);
  }
  .hour-chip.now-chip {
    border-color: rgba(59,130,246,0.4);
    background: var(--blue-dim);
  }
  .hour-chip.now-chip.active {
    border-color: var(--orange-border);
    background: var(--orange-dim);
  }

  .hc-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
  }
  .hour-chip.active .hc-time,
  .hour-chip.now-chip .hc-time { color: var(--text2); }

  .hc-icon { font-size: 13px; line-height: 1; }

  .hc-temp {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }

  .hc-rain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--blue);
  }



  .weather-loading {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 11px;
    gap: 6px;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .weather-unavail {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--text3);
    font-size: 11px;
  }
  .weather-unavail .big { font-size: 24px; }

  /* ── FOOTER ── */
  #footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0 2px;
    border-top: 1px solid var(--border);
    margin-top: 2px;
  }

  .race-countdown {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .countdown-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .countdown-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 900;
    color: var(--orange);
  }

  .footer-center {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    text-align: center;
  }

  .pb-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    text-align: right;
  }
  .pb-info strong { color: var(--text2); }

  /* Phase colours */
  .phase-base { background: rgba(34,197,94,0.15); color: #22c55e; }
  .phase-marathon { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .phase-peak { background: rgba(239,68,68,0.15); color: #f87171; }
  .phase-consol { background: rgba(168,85,247,0.15); color: #c084fc; }
  .phase-taper { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .phase-race { background: rgba(245,130,10,0.2); color: var(--orange); }

  .wt-cutback { background: rgba(239,68,68,0.12); color: #f87171; }
  .wt-build { background: rgba(34,197,94,0.12); color: #4ade80; }
  .wt-bridge { background: rgba(245,158,11,0.12); color: #fbbf24; }
  .wt-weeka { background: rgba(245,130,10,0.12); color: var(--orange); }
  .wt-weekb { background: rgba(59,130,246,0.12); color: #60a5fa; }
  .wt-holiday { background: rgba(168,85,247,0.12); color: #c084fc; }
  .wt-default { background: var(--surface3); color: var(--text2); }

  /* Race day special */
  .race-day-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 20px;
  }
  .race-day-icon { font-size: 36px; }
  .race-day-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--orange);
  }
  .race-day-sub { font-size: 11px; color: var(--text2); text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">Nat's <span>Training Plan</span></div>
    <div class="nav-controls">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&#8592;</button>
      <div class="date-display">
        <div class="day-name" id="dayName">—</div>
        <div id="dateDisplay">—</div>
      </div>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&#8594;</button>
      <button class="today-btn" onclick="goToday()">Today</button>
    </div>
  </div>

  <div id="main">
    <div id="top-strip">
      <span class="phase-badge" id="phaseBadge">—</span>
      <span class="week-type-badge" id="weekTypeBadge">—</span>
      <span class="sep">|</span>
      <span class="week-aim" id="weekAim">—</span>
      <span class="week-label" id="weekLabel">—</span>
    </div>

    <div id="session-panel">
      <div class="panel-header">
        <div class="session-type-label" id="sessionTypeLabel">—</div>
        <div class="day-badge" id="dayColLabel">—</div>
      </div>
      <div class="stats-row" id="statsRow">
        <div class="stat-block">
          <div class="stat-label">Distance</div>
          <div class="stat-value km" id="statKm">—</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Duration</div>
          <div class="stat-value time" id="statTime">—</div>
        </div>
      </div>
      <div class="session-body" id="sessionBody">
        <div class="session-text"><p>Loading...</p></div>
      </div>
    </div>

    <div id="weather-panel">
      <div class="weather-header">
        <div class="weather-title">🌤 Weather — BR6</div>
        <div class="weather-loc" id="weatherTimeLabel">Live conditions</div>
      </div>
      <div id="currentConditions" class="current-conditions" style="display:none">
        <div class="current-temp" id="curTemp">—<span>°C</span></div>
        <div class="current-desc">
          <div class="current-condition" id="curCondition">—</div>
          <div class="current-meta" id="curMeta">—</div>
        </div>
        <div class="run-suitability" id="runSuit">
          <div class="suit-label">Running</div>
          <div class="suit-val" id="suitVal">—</div>
        </div>
      </div>
      <div class="hourly-label" id="hourlyLabel" style="display:none">Hourly forecast — tap to select</div>
      <div class="hourly-scroll" id="hourlyStrip" style="display:none"></div>

    </div>
  </div>

  <div id="progress-bottom">
    <div class="progress-label-bottom" id="progressLabel">Week — of 39 · Day —</div>
    <div class="progress-bar-full"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div id="footer">
    <div class="race-countdown">
      <span class="countdown-label">Valencia Marathon</span>
      <span class="countdown-val" id="countdown">—</span>
    </div>
    <div class="footer-center" id="footerCenter">Sub-2:55:00 · 6 December 2026 · Valencia</div>
    <div class="pb-info">PB <strong>3:05:46</strong> London 2025</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// PLAN DATA
// ═══════════════════════════════════════════════
const PLAN_START = new Date(2026, 2, 9); // 9 Mar 2026 (Mon)
const RACE_DATE  = new Date(2026, 11, 6); // 6 Dec 2026

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// Week data indexed 0–38 (weeks 1–39)
const weeks = [
  // Week 1 — 9 Mar
  { phase:'Base Build', weekType:'', weekA_B:'',
    km:'16.2–21.5km', time:'2h05m–2h30m',
    aim:'3 run days · All easy HR 130–155 · Thu/Fri/Sun = rest · Building the aerobic base from scratch',
    days:{

// Day column mapping
const DAY_COLS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_NAMES_FULL = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let currentDate = new Date();
currentDate.setHours(0,0,0,0);

let weatherData = null;
let selectedHour = null;
let weatherForDate = null;

// ═══════════════════════════════════════════════
// DATE UTILITIES
// ═══════════════════════════════════════════════
function daysBetween(a, b) {
  return Math.round((b - a) / 86400000);
}

function getPlanDay(date) {
  const diff = daysBetween(PLAN_START, date);
  if (diff < 0) return null;
  const weekIdx = Math.floor(diff / 7);
  const dayIdx = diff % 7; // 0=Mon, 6=Sun
  if (weekIdx >= weeks.length) return null;
  return { weekIdx, dayIdx, week: weeks[weekIdx], dayKey: DAY_COLS[dayIdx] };
}

function formatDate(d) {
  return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

function getDayOfWeekName(d) {
  return DAYS[d.getDay()];
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function navigate(delta) {
  const nd = new Date(currentDate);
  nd.setDate(nd.getDate() + delta);
  currentDate = nd;
  render();
}

function goToday() {
  currentDate = new Date();
  currentDate.setHours(0,0,0,0);
  render();
}

// ═══════════════════════════════════════════════
// EFFORT COLOURS
// ═══════════════════════════════════════════════
function effortChip(effort) {
  const map = {
    easy:       ['#22c55e','rgba(34,197,94,0.15)','Easy · Z1–Z2 · HR 130–155'],
    threshold:  ['#ef4444','rgba(239,68,68,0.15)','Threshold · Z4 · HR 165–178'],
    vo2max:     ['#a855f7','rgba(168,85,247,0.15)','5k/VO2max · Z5 · HR 178–196'],
    mp:         ['#3b82f6','rgba(59,130,246,0.15)','Marathon Pace · Z3 · HR 158–165'],
    progression:['#f59e0b','rgba(245,158,11,0.15)','Progression · Easy→Steady→Threshold'],
  };
  const [col, bg, label] = map[effort] || ['#9aa0aa','rgba(154,160,170,0.15)','Mixed'];
  return `<span class="effort-chip" style="color:${col};background:${bg};border:1px solid ${col}40">${label}</span>`;
}

// ═══════════════════════════════════════════════
// SESSION RENDER
// ═══════════════════════════════════════════════
function renderSession(planDay) {
  const { weekIdx, dayKey, week } = planDay;
  const dayData = week.days[dayKey];
  const dayFull = DAY_NAMES_FULL[DAY_COLS.indexOf(dayKey)];

  // Day badge
  document.getElementById('dayColLabel').textContent = dayFull;

  // Session type label
  const stl = document.getElementById('sessionTypeLabel');
  stl.textContent = dayData.type;

  // Colour session type
  let typeColour = 'var(--text)';
  if (dayData.rest || dayData.holiday) typeColour = 'var(--text3)';
  else if (dayData.raceDay) typeColour = 'var(--orange)';
  else if (dayData.effort === 'threshold') typeColour = '#ef4444';
  else if (dayData.effort === 'vo2max') typeColour = '#a855f7';
  else if (dayData.effort === 'mp') typeColour = '#3b82f6';
  else if (dayData.effort === 'progression') typeColour = '#f59e0b';
  else if (dayData.effort === 'easy') typeColour = '#22c55e';
  stl.style.color = typeColour;

  // Stats
  const statsRow = document.getElementById('statsRow');
  const statKm = document.getElementById('statKm');
  const statTime = document.getElementById('statTime');

  if (dayData.rest || dayData.holiday) {
    statsRow.style.display = 'none';
  } else if (dayData.strengthOnly) {
    statsRow.style.display = 'none';
  } else if (dayData.raceDay) {
    statsRow.style.display = 'grid';
    statKm.innerHTML = '42.2<span style="font-size:12px;color:var(--text2)">km</span>';
    statTime.innerHTML = 'Sub-2:55<span style="font-size:12px;color:var(--text2)"></span>';
  } else {
    statsRow.style.display = 'grid';
    if (dayData.km) {
      // Bold the range
      statKm.innerHTML = `<span style="font-size:18px">${dayData.km}</span>`;
    } else {
      statKm.textContent = '—';
    }
    if (dayData.time) {
      statTime.innerHTML = `<span style="font-size:18px">${dayData.time}</span>`;
    } else {
      statTime.textContent = '—';
    }
  }

  // Session body
  const body = document.getElementById('sessionBody');
  body.innerHTML = '';

  if (dayData.raceDay) {
    body.innerHTML = `
      <div class="race-day-card">
        <div class="race-day-icon">🏅</div>
        <div class="race-day-title">Race Day — Valencia</div>
        <div class="race-day-sub">${dayData.detail.replace(/\n/g,'<br>')}</div>
      </div>`;
    return;
  }

  if (dayData.rest) {
    body.innerHTML = `
      <div class="rest-card">
        <div class="rest-icon">😴</div>
        <div class="rest-title">Rest Day</div>
        <div class="rest-sub">Recovery is where adaptation happens.<br>Stay off your feet, sleep well, eat well.</div>
      </div>`;
    return;
  }

  if (dayData.holiday) {
    body.innerHTML = `
      <div class="rest-card">
        <div class="rest-icon">🏖️</div>
        <div class="rest-title">Holiday</div>
        <div class="rest-sub">${dayData.session}</div>
      </div>`;
    return;
  }

  let html = '';

  // Run section for combined days
  const isMonday = dayKey === 'Mon';
  const hasRun = dayData.km && !dayData.strengthOnly;
  const hasStrength = dayData.strength && !dayData.strengthOnly;

  if (dayData.strengthOnly) {
    // Strength only
    html += `<span class="label">Monday Strength Session</span>`;
    html += `<div class="strength-section">`;
    html += `<div class="strength-header">💪 Strength — 30–45 min</div>`;
    html += `<div class="session-text" style="font-size:11px;color:var(--text2)">${dayData.detail}</div>`;
    html += `</div>`;
    html += renderCoachStrength(weekIdx);
    body.innerHTML = html;
    return;
  }

  // Session title
  html += `<span class="label">Session</span>`;
  html += `<div class="session-text"><p>${dayData.session}</p></div>`;

  // Effort chip
  if (dayData.effort) {
    html += effortChip(dayData.effort);
  }

  // Detail
  if (dayData.detail) {
    html += `<span class="label">What to do</span>`;
    html += `<div class="session-text"><p>${dayData.detail.replace(/\n/g,'<br>')}</p></div>`;
  }

  // Strides note
  if (dayData.strides) {
    html += `<div class="coach-cue effort">⚡ Strides: 100m controlled accelerations — not sprints. On trail routes, effort and HR matter more than pace.</div>`;
  }

  // PM Double
  if (dayData.pmDouble) {
    html += `<div class="coach-cue key">🌙 PM double: Keep the shakeout very gentle — Z1 only. Its only purpose is to add blood flow, not additional stimulus.</div>`;
  }

  // MP finish cue
  if (dayData.mpFinish) {
    html += `<div class="coach-cue hr">🎯 MP finish: HR 158–165. A few words at a time. Should feel hard but sustainable. If HR climbs above 165 in the MP section, ease back — don't force it.</div>`;
  }

  // HR cue based on effort
  html += renderHRCue(dayData.effort);

  // Fuelling
  if (dayData.fuel) {
    html += `<div class="coach-cue fuel">🍬 Fuelling: Take a gel every 45 min. Practise what you plan to use on race day. Aim for ~60g carbs/hour on runs over 90 min.</div>`;
  }

  // Strength block for combined Monday sessions
  if (hasStrength && hasRun) {
    html += `<span class="label">Strength Session (after run)</span>`;
    html += `<div class="strength-section">`;
    html += `<div class="strength-header">💪 Strength — 30–45 min</div>`;
    html += `<div class="session-text" style="font-size:11px;color:var(--text2)">`;
    html += renderStrengthDetail(weekIdx);
    html += `</div></div>`;
  }

  body.innerHTML = html;
}

function renderHRCue(effort) {
  const cues = {
    easy:       `<div class="coach-cue hr">💓 HR target: 130–155 bpm (Z1–Z2). Fully conversational — complete sentences. If you can't speak in full sentences, slow down.</div>`,
    threshold:  `<div class="coach-cue hr">💓 HR target: 165–178 bpm (Z4). Single words only — hard but controlled. Final reps may peak above 178 — that's normal drift.</div>`,
    vo2max:     `<div class="coach-cue hr">💓 HR target: 178–196 bpm (Z5). Cannot speak. Maximal breathing. Short hard bursts — effort is the point, not pace.</div>`,
    mp:         `<div class="coach-cue hr">💓 HR target: 158–165 bpm (Z3). A few words at a time. Controlled and sustainable. Should feel almost too easy in the first segment.</div>`,
    progression:`<div class="coach-cue hr">💓 Progressive HR: Easy 130–155 → Steady 155–163 → Threshold 165–178. Clear steps — do not blur the transitions.</div>`,
  };
  return cues[effort] || '';
}

function renderCoachStrength(weekIdx) {
  const phase = weekIdx < 7 ? 'early' : weekIdx < 12 ? 'mid-early' : weekIdx < 30 ? 'main' : 'late';
  if (phase === 'early') {
    return `<div class="coach-cue effort" style="margin-top:6px">Focus: single-leg glute bridges, lateral band walks, Copenhagen planks, clamshells — hip abductor and glute med priority given IT band history.</div>`;
  }
  if (phase === 'main') {
    return `<div class="coach-cue effort" style="margin-top:6px">Add load: Bulgarian split squats, RDLs, single-leg calf raises, lateral band work. 3×10–12. Monitor for right-side asymmetry.</div>`;
  }
  return `<div class="coach-cue effort" style="margin-top:6px">Maintain load, reduce volume. Focus on quality over quantity.</div>`;
}

function renderStrengthDetail(weekIdx) {
  if (weekIdx < 7) return 'Bodyweight: single-leg squats, hip thrusts, calf raises, glute bridges, dead bugs. 3×12–15. Priority: hip abductors and glute med (IT band history).';
  if (weekIdx < 12) return 'Light load introduced: add resistance bands and light dumbbells. Single-leg squats, hip thrusts, calf raises, lateral band walks. 3×12.';
  return 'Load phase: Bulgarian split squats, RDLs, single-leg calf raises, lateral band work, Copenhagen planks. 3×10–12.';
}

// ═══════════════════════════════════════════════
// TOP STRIP
// ═══════════════════════════════════════════════
function renderTopStrip(planDay) {
  const { weekIdx, week } = planDay;

  // Phase badge
  const pb = document.getElementById('phaseBadge');
  const phaseMap = {
    'Base Build':    'phase-base',
    'Marathon Block':'phase-marathon',
    'Peak':          'phase-peak',
    'Consolidation': 'phase-consol',
    'Taper':         'phase-taper',
    'Race Week':     'phase-race',
  };
  pb.className = `phase-badge ${phaseMap[week.phase] || 'phase-base'}`;
  pb.textContent = week.phase;

  // Week type badge
  const wb = document.getElementById('weekTypeBadge');
  const wt = week.weekType || '';
  const weekA_B = week.weekA_B;

  let wtClass = 'wt-default';
  let wtText = weekA_B ? `Week ${weekA_B}` : '—';

  if (wt.includes('CUT-BACK')) { wtClass = 'wt-cutback'; wtText = 'Cut-Back'; }
  else if (wt.includes('BUILD')) { wtClass = 'wt-build'; wtText = 'Build Week'; }
  else if (wt.includes('BRIDGE')) { wtClass = 'wt-bridge'; wtText = 'Bridge Week'; }
  else if (wt.includes('TRANSITION')) { wtClass = 'wt-bridge'; wtText = 'Transition'; }
  else if (wt.includes('HOLIDAY')) { wtClass = 'wt-holiday'; wtText = 'Holiday'; }
  else if (wt.includes('RACE')) { wtClass = 'phase-race'; wtText = 'Race Week'; }
  else if (wt) { wtClass = 'wt-default'; wtText = wt; }
  else if (weekA_B === 'A') { wtClass = 'wt-weeka'; wtText = 'Week A'; }
  else if (weekA_B === 'B') { wtClass = 'wt-weekb'; wtText = 'Week B'; }

  wb.className = `week-type-badge ${wtClass}`;
  wb.textContent = wtText;

  // Week aim
  document.getElementById('weekAim').innerHTML = week.aim;
  document.getElementById('weekLabel').textContent = `Wk ${weekIdx+1} of 39 · ${week.km} · ${week.time}`;
}

// ═══════════════════════════════════════════════
// PROGRESS BAR
// ═══════════════════════════════════════════════
function renderProgress(planDay) {
  if (!planDay) { return; }
  const totalDays = 39 * 7;
  const elapsed = planDay.weekIdx * 7 + planDay.dayIdx + 1;
  const pct = Math.min(100, (elapsed / totalDays) * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Week ${planDay.weekIdx+1} of 39 · Day ${planDay.dayIdx+1} of 7`;
}

// ═══════════════════════════════════════════════
// COUNTDOWN
// ═══════════════════════════════════════════════
function renderCountdown() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const days = daysBetween(today, RACE_DATE);
  if (days < 0) {
    document.getElementById('countdown').textContent = 'Done!';
  } else if (days === 0) {
    document.getElementById('countdown').textContent = 'TODAY 🎉';
  } else {
    document.getElementById('countdown').textContent = `${days} days to go`;
  }
}

// ═══════════════════════════════════════════════
// WEATHER
// ═══════════════════════════════════════════════
const BR6_LAT = 51.37;
const BR6_LON = 0.05;

const WMO_CODES = {
  0:'Clear', 1:'Mainly Clear', 2:'Partly Cloudy', 3:'Overcast',
  45:'Fog', 48:'Icy Fog', 51:'Light Drizzle', 53:'Drizzle', 55:'Heavy Drizzle',
  61:'Light Rain', 63:'Rain', 65:'Heavy Rain', 71:'Light Snow', 73:'Snow', 75:'Heavy Snow',
  77:'Snow Grains', 80:'Light Showers', 81:'Showers', 82:'Heavy Showers',
  85:'Snow Showers', 86:'Heavy Snow Showers', 95:'Thunderstorm', 96:'Thunderstorm + Hail', 99:'Severe Thunderstorm'
};

const WMO_ICONS = {
  0:'☀️', 1:'🌤', 2:'⛅', 3:'☁️',
  45:'🌫', 48:'🌫', 51:'🌦', 53:'🌦', 55:'🌧',
  61:'🌦', 63:'🌧', 65:'⛈', 71:'🌨', 73:'❄️', 75:'❄️',
  77:'🌨', 80:'🌦', 81:'🌧', 82:'⛈',
  85:'🌨', 86:'❄️', 95:'⛈', 96:'⛈', 99:'⛈'
};

function getRunSuitability(temp, rain, wind, wmo) {
  if (rain > 70 || wmo >= 95) return ['Poor','#ef4444'];
  if (rain > 40 || temp < 0 || temp > 28 || wind > 50) return ['Tricky','#f59e0b'];
  if (temp >= 5 && temp <= 20 && rain < 20 && wind < 30) return ['Good','#22c55e'];
  return ['OK','#3b82f6'];
}



function isToday(date) {
  const today = new Date();
  return date.getFullYear() === today.getFullYear() &&
    date.getMonth() === today.getMonth() &&
    date.getDate() === today.getDate();
}

function isFuture(date) {
  const today = new Date();
  today.setHours(0,0,0,0);
  return date > today;
}

function isPast(date) {
  const today = new Date();
  today.setHours(0,0,0,0);
  return date < today;
}

async function fetchWeather(date) {
  const d = date.toISOString().slice(0,10);
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${BR6_LAT}&longitude=${BR6_LON}&hourly=temperature_2m,precipitation_probability,precipitation,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature&timezone=Europe%2FLondon&start_date=${d}&end_date=${d}`;
  const r = await fetch(url);
  return r.json();
}

function buildHourlyStrip(data, date) {
  const hours = data.hourly;
  const now = new Date();
  const todayFlag = isToday(date);

  let strip = '';
  for (let h = 0; h < 24; h++) {
    const temp = Math.round(hours.temperature_2m[h]);
    const rain = Math.round(hours.precipitation_probability[h]);
    const wmo = hours.weathercode[h];
    const icon = WMO_ICONS[wmo] || '🌡';
    const isNow = todayFlag && now.getHours() === h;
    const isSelected = selectedHour === h;

    strip += `<div class="hour-chip ${isNow ? 'now-chip' : ''} ${isSelected ? 'active' : ''}" onclick="selectHour(${h})">
      <div class="hc-time">${String(h).padStart(2,'0')}:00</div>
      <div class="hc-icon">${icon}</div>
      <div class="hc-temp">${temp}°</div>
      <div class="hc-rain" style="color:${rain>50?'#3b82f6':rain>20?'#6366f1':'var(--text3)'}">${rain}%</div>
    </div>`;
  }
  return strip;
}



function selectHour(h) {
  selectedHour = h;
  if (weatherData) {
    document.getElementById('hourlyStrip').innerHTML = buildHourlyStrip(weatherData, currentDate);
    rerenderCurrentConditions(h);
  }
}

function showWeatherLoading() {
  const cc = document.getElementById('currentConditions');
  cc.style.display = 'grid';
  document.getElementById('curTemp').innerHTML = '<div class="spinner"></div>';
  document.getElementById('curCondition').textContent = 'Fetching weather…';
  document.getElementById('curMeta').innerHTML = '';
  document.getElementById('suitVal').textContent = '—';
  document.getElementById('suitVal').style.color = 'var(--text3)';
  document.getElementById('hourlyLabel').style.display = 'none';
  document.getElementById('hourlyStrip').style.display = 'none';
}

function showWeatherUnavailable(msg) {
  const cc = document.getElementById('currentConditions');
  cc.style.display = 'grid';
  document.getElementById('curTemp').innerHTML = '📅';
  document.getElementById('curCondition').textContent = msg;
  document.getElementById('curMeta').innerHTML = '';
  document.getElementById('suitVal').textContent = '—';
  document.getElementById('suitVal').style.color = 'var(--text3)';
  document.getElementById('hourlyLabel').style.display = 'none';
  document.getElementById('hourlyStrip').style.display = 'none';
}

async function loadWeather() {
  const dateKey = currentDate.toISOString().slice(0,10);

  // Don't reload if same date
  if (weatherForDate === dateKey && weatherData) {
    rerenderWeather();
    return;
  }

  // Past dates — no weather
  if (isPast(currentDate)) {
    showWeatherUnavailable('No historical forecast needed for past dates');
    document.getElementById('weatherTimeLabel').textContent = 'Past date';
    return;
  }

  // Check if within forecast range (16 days)
  const daysOut = daysBetween(new Date(), currentDate);
  if (daysOut > 14) {
    showWeatherUnavailable('Weather forecast not available this far ahead — check closer to the date');
    document.getElementById('weatherTimeLabel').textContent = 'Too far ahead';
    return;
  }

  showWeatherLoading();

  try {
    const data = await fetchWeather(currentDate);
    weatherData = data;
    weatherForDate = dateKey;

    if (isToday(currentDate)) {
      // Default to current hour
      selectedHour = new Date().getHours();
      document.getElementById('weatherTimeLabel').textContent = 'Live conditions · BR6';
    } else {
      // Default to 05:00
      selectedHour = 5;
      document.getElementById('weatherTimeLabel').textContent = `Forecast 05:00 · BR6`;
    }

    rerenderWeather();
  } catch(e) {
    showWeatherUnavailable('Could not load weather — check connection');
  }
}

function rerenderCurrentConditions(h) {
  const hours = weatherData.hourly;
  const temp = Math.round(hours.temperature_2m[h]);
  const feelsLike = Math.round(hours.apparent_temperature[h]);
  const rain = Math.round(hours.precipitation_probability[h]);
  const wind = Math.round(hours.windspeed_10m[h]);
  const humidity = Math.round(hours.relativehumidity_2m[h]);
  const wmo = hours.weathercode[h];
  const icon = WMO_ICONS[wmo] || '🌡';
  const cond = WMO_CODES[wmo] || 'Unknown';
  const [suitLabel, suitCol] = getRunSuitability(temp, rain, wind, wmo);

  const cc = document.getElementById('currentConditions');
  cc.style.display = 'grid';
  document.getElementById('curTemp').innerHTML = `${icon} ${temp}<span>°C</span>`;
  document.getElementById('curCondition').textContent = cond;
  document.getElementById('curMeta').innerHTML = `
    <span>🌡 Feels ${feelsLike}°C</span>
    <span>💧 ${humidity}% humidity</span>
    <span>💨 ${wind} km/h</span>
    <span>🌧 ${rain}% rain</span>
  `;
  document.getElementById('suitVal').textContent = suitLabel;
  document.getElementById('suitVal').style.color = suitCol;
}

function rerenderWeather() {
  if (!weatherData) return;

  const h = selectedHour;
  rerenderCurrentConditions(h);

  // Hourly strip
  const hourlyLabel = document.getElementById('hourlyLabel');
  const hourlyStrip = document.getElementById('hourlyStrip');
  hourlyLabel.style.display = 'block';
  hourlyStrip.style.display = 'flex';
  hourlyStrip.innerHTML = buildHourlyStrip(weatherData, currentDate);

  // Scroll selected hour into view
  setTimeout(() => {
    const chips = hourlyStrip.querySelectorAll('.hour-chip');
    if (chips[h]) chips[h].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }, 50);
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
function render() {
  // Date display
  document.getElementById('dayName').textContent = getDayOfWeekName(currentDate).toUpperCase();
  document.getElementById('dateDisplay').textContent = formatDate(currentDate);

  // Countdown
  renderCountdown();

  // Plan day
  const planDay = getPlanDay(currentDate);

  if (!planDay) {
    // Before plan or after race
    const daysBefore = daysBetween(currentDate, PLAN_START);
    const daysAfter = daysBetween(RACE_DATE, currentDate);

    document.getElementById('phaseBadge').textContent = daysBefore > 0 ? 'Pre-Plan' : 'Post-Race';
    document.getElementById('phaseBadge').className = 'phase-badge wt-default';
    document.getElementById('weekTypeBadge').textContent = '—';
    document.getElementById('weekAim').textContent = daysBefore > 0 ? `Plan starts ${formatDate(PLAN_START)} · ${daysBefore} days away` : 'Valencia Marathon completed!';
    document.getElementById('weekLabel').textContent = '';
    document.getElementById('sessionTypeLabel').textContent = daysBefore > 0 ? 'Pre-Plan' : 'Done';
    document.getElementById('sessionTypeLabel').style.color = 'var(--text2)';
    document.getElementById('statsRow').style.display = 'none';
    document.getElementById('sessionBody').innerHTML = `
      <div class="rest-card">
        <div class="rest-icon">${daysBefore > 0 ? '🗓️' : '🏅'}</div>
        <div class="rest-title">${daysBefore > 0 ? 'Before Plan' : 'Post Race'}</div>
        <div class="rest-sub">${daysBefore > 0 ? `Training begins ${formatDate(PLAN_START)}` : 'Sub-2:55. Trust the training.'}</div>
      </div>`;
    document.getElementById('progressFill').style.width = daysBefore > 0 ? '0%' : '100%';
    document.getElementById('progressLabel').textContent = daysBefore > 0 ? 'Plan not started' : 'Plan complete';
    loadWeather();
    return;
  }

  renderProgress(planDay);
  renderTopStrip(planDay);
  renderSession(planDay);

  // Reset weather cache if date changed
  loadWeather();
}

// ═══════════════════════════════════════════════
// SWIPE NAVIGATION
// ═══════════════════════════════════════════════
(function() {
  let startX = 0, startY = 0;
  const el = document.getElementById('app');
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      navigate(dx < 0 ? 1 : -1);
    }
  }, { passive: true });
})();

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
render();
</script>
